aid: chime
name: Chime
description: Chime is a neobank and fintech platform offering fee-free checking and
  savings accounts, early paycheck access, credit building, and peer-to-peer payment
  features for consumer banking. The Chime Partner API enables developers to access
  user account information, transaction details, account balances, statements, and
  payment initiation through OAuth 2.0 authentication.
